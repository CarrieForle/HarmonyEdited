name: pacakge theme to .pect file
run-name: ${{ github.actor }} is learning GitHub Actions
on: [push]
jobs:
  package-theme:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: robinraju/release-downloader@v1
        with: 
          repository: ip7z/7zip
          latest: true
          fileName: 7zr.exe
          tarBall: false
          zipBall: false
      - uses: robinraju/release-downloader@v1
        with: 
          repository: JosefNemec/Playnite
          latest: true
          fileName: '*.7z'
          tarBall: false
          zipBall: false
      - run: ./7zr.exe x -bd -oplaynite *.7z
      - run: ./Toolbox.exe pack ../source/ ../output
        working-directory: playnite
      - uses: actions/upload-artifact@v6
        with:
          path: output/*.pthm

  release:
    runs-on: ubuntu-latest
    needs: package-theme
    steps:
    - uses: actions/download-artifact@v7
    - env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        tag: ${{ github.ref_name }}
      run: >-
          gh release create "$tag"
          --repo "$GITHUB_REPOSITORY"
          --title "${tag#v}"
          --generate-notes
          *.pthm
