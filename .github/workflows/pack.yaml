name: pacakge theme to .pect file
run-name: ${{ github.actor }} is learning GitHub Actions
on: [push]
jobs:
  setup-dotnet:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          repository: JosefNemec/Playnite
          sparse-checkout: source/Tools/Playnite.Toolbox
          sparse-checkout-cone-mode: true
      - uses: microsoft/setup-msbuild@v2
        with:
          msbuild-architecture: x64
      - run: msbuild Playnite.Toolbox.csproj -p:Configuration=Release -p:Platform=x64
        working-directory: source/Tools/Playnite.ToolBox
